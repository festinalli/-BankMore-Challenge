global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: contacorrente-api
    metrics_path: /metrics
    static_configs:
      - targets: ['contacorrente-api:8080']
        labels: { service: contacorrente-api, layer: api }

  - job_name: transferencia-api
    metrics_path: /metrics
    static_configs:
      - targets: ['transferencia-api:8080']
        labels: { service: transferencia-api, layer: api }

  - job_name: tarifas-worker
    metrics_path: /metrics
    static_configs:
      - targets: ['tarifas-worker:9102']
        labels: { service: tarifas-worker, layer: worker }

  - job_name: fraud-ml
    metrics_path: /metrics
    static_configs:
      - targets: ['fraud-ml:5003']
        labels: { service: fraud-ml, layer: ml }

  # Sprint 5.A — fraud-detector via Flink PrometheusReporter nativo.
  # JAR /opt/flink/plugins/metrics-prometheus/flink-metrics-prometheus-1.18.1.jar
  # auto-carregado; reporter configurado via Configuration() no main() do job.
  # Métricas auto-instrumentadas: Flink_Job_*, Flink_Task_*, KafkaSourceReader_*,
  # KafkaSinkWriter_*, Status_JVM_*, Checkpoint_*.
  - job_name: fraud-detector
    metrics_path: /
    static_configs:
      - targets: ['fraud-detector:9249']
        labels: { service: fraud-detector, layer: streaming }
