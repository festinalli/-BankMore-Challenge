# BankMore — infra + app unificada
# Tudo sobe com: make up    (depende do .env na raiz do projeto)

services:
  # ============================================================
  # Postgres 16
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: bankmore-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bankmore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bankmore123}
      POSTGRES_DB: ${POSTGRES_DB:-bankmore_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bankmore} -d ${POSTGRES_DB:-bankmore_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [bankmore]

  # ============================================================
  # Redis
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: bankmore-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [bankmore]

  # ============================================================
  # Kafka stack
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: bankmore-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [bankmore]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bankmore-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bankmore]

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bankmore-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic transferencia.solicitada --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic transferencia.aprovada  --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic transferencia.rejeitada --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fraude.alerta            --partitions 3 --replication-factor 1
      echo '--- Tópicos ---' && kafka-topics --bootstrap-server kafka:29092 --list
      "
    restart: "no"
    networks: [bankmore]

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: bankmore-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bankmore]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bankmore-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: bankmore
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    networks: [bankmore]

  # ============================================================
  # Flink 1.18 (placeholders — usados a partir do Sprint 2)
  # ============================================================
  flink-jobmanager:
    image: flink:1.18-java11
    container_name: bankmore-flink-jm
    ports:
      - "8082:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: rocksdb
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/savepoints
        execution.checkpointing.interval: 60000
        execution.checkpointing.mode: EXACTLY_ONCE
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - flink_savepoints:/opt/flink/savepoints
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bankmore]

  flink-taskmanager:
    image: flink:1.18-java11
    container_name: bankmore-flink-tm
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - flink_savepoints:/opt/flink/savepoints
    networks: [bankmore]

  # ============================================================
  # Applications (.NET 8)
  # ============================================================
  contacorrente-api:
    build:
      context: ../..
      dockerfile: src/BankMore.ContaCorrente.Api/Dockerfile
    container_name: bankmore-contacorrente-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-bankmore_db};Username=${POSTGRES_USER:-bankmore};Password=${POSTGRES_PASSWORD:-bankmore123};Maximum Pool Size=20
      JWT_KEY: ${JWT_KEY:?env JWT_KEY é obrigatória}
    networks: [bankmore]

  transferencia-api:
    build:
      context: ../..
      dockerfile: src/BankMore.Transferencia.Api/Dockerfile
    container_name: bankmore-transferencia-api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "5001:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-bankmore_db};Username=${POSTGRES_USER:-bankmore};Password=${POSTGRES_PASSWORD:-bankmore123};Maximum Pool Size=10
      Kafka__Broker: kafka:29092
      JWT_KEY: ${JWT_KEY:?env JWT_KEY é obrigatória}
    networks: [bankmore]

  tarifas-worker:
    build:
      context: ../..
      dockerfile: src/BankMore.Tarifas.Worker/Dockerfile
    container_name: bankmore-tarifas-worker
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-bankmore_db};Username=${POSTGRES_USER:-bankmore};Password=${POSTGRES_PASSWORD:-bankmore123};Maximum Pool Size=10
      Kafka__Broker: kafka:29092
    networks: [bankmore]

  # Sprint 2: detector com state por CPF + 3 producers (aprovada/rejeitada/alerta).
  # Implementação Python da MESMA topologia que o job PyFlink seria.
  # Sprint 4 substitui pela imagem PyFlink real (Dockerfile.flink) submetida ao JM/TM.
  fraud-detector:
    build:
      context: ../../pyflink
      dockerfile: Dockerfile
    container_name: bankmore-fraud-detector
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka:29092
      SOURCE_TOPIC: transferencia.solicitada
      SINK_APROVADA: transferencia.aprovada
      SINK_REJEITADA: transferencia.rejeitada
      SINK_ALERTA: fraude.alerta
      GROUP_ID: fraud-detector
      VALOR_ALTO_BRL: "10000.00"
      BURST_LIMITE_POR_MINUTO: "4"
      JANELA_BURST_SEGUNDOS: "60"
      WATERMARK_DELAY_SECONDS: "5"
      CHECKPOINT_INTERVAL_MS: "60000"
    restart: on-failure
    networks: [bankmore]

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  flink_checkpoints:
  flink_savepoints:

networks:
  bankmore:
    driver: bridge
