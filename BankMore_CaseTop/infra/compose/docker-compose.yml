# BankMore — infra + app unificada
# Tudo sobe com: make up    (depende do .env na raiz do projeto)

services:
  # ============================================================
  # Postgres 16
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: bankmore-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bankmore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bankmore123}
      POSTGRES_DB: ${POSTGRES_DB:-bankmore_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      # Sprint 8 — schema do bounded context PIX (DICT, pagamentos, MED, QR, consentimentos)
      - ../db/01-pix.sql:/docker-entrypoint-initdb.d/01-pix.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bankmore} -d ${POSTGRES_DB:-bankmore_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [bankmore]

  # ============================================================
  # Redis
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: bankmore-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [bankmore]

  # ============================================================
  # Kafka stack
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: bankmore-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [bankmore]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bankmore-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bankmore]

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bankmore-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic transferencia.solicitada --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic transferencia.aprovada  --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic transferencia.rejeitada --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fraude.alerta            --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic pix.liquidada           --partitions 3 --replication-factor 1
      echo '--- Tópicos ---' && kafka-topics --bootstrap-server kafka:29092 --list
      "
    restart: "no"
    networks: [bankmore]

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: bankmore-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bankmore]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bankmore-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: bankmore
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    networks: [bankmore]

  # ============================================================
  # Flink 1.18 (placeholders — usados a partir do Sprint 2)
  # ============================================================
  flink-jobmanager:
    image: flink:1.18-java11
    container_name: bankmore-flink-jm
    ports:
      - "8082:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: rocksdb
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/savepoints
        execution.checkpointing.interval: 60000
        execution.checkpointing.mode: EXACTLY_ONCE
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - flink_savepoints:/opt/flink/savepoints
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bankmore]

  flink-taskmanager:
    image: flink:1.18-java11
    container_name: bankmore-flink-tm
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - flink_savepoints:/opt/flink/savepoints
    networks: [bankmore]

  # ============================================================
  # Applications (.NET 8)
  # ============================================================
  # ============================================================
  # Sprint 8 — PIX real: bacen-sim (DICT + SPI/ISO 20022) + pix-api
  # ============================================================
  bacen-sim:
    build:
      context: ../..
      dockerfile: src/BankMore.BacenSim/Dockerfile
    container_name: bankmore-bacen-sim
    ports:
      - "5005:8080"   # DICT + SPI + Swagger + /metrics
    restart: on-failure
    networks: [bankmore]

  pix-api:
    build:
      context: ../..
      dockerfile: src/BankMore.Pix.Api/Dockerfile
    container_name: bankmore-pix-api
    depends_on:
      postgres:
        condition: service_healthy
      bacen-sim:
        condition: service_healthy
      # Sprint 9 — antifraude inline chama o fraud-ml
      fraud-ml:
        condition: service_healthy
      # Sprint 10.A — publica pix.liquidada no Kafka
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "5006:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-bankmore_db};Username=${POSTGRES_USER:-bankmore};Password=${POSTGRES_PASSWORD:-bankmore123};Maximum Pool Size=10
      JWT_KEY: ${JWT_KEY:?env JWT_KEY é obrigatória}
      BACEN_SIM_URL: http://bacen-sim:8080
      # Sprint 8.E — scheduler de recorrência do PIX Automático
      PixAutomatico__PollIntervalSeconds: "15"
      # Sprint 9 — antifraude inline (scoring síncrono antes da liquidação SPI)
      FRAUDE_ML_URL: http://fraud-ml:5003
      FRAUDE_HABILITADO: "true"
      FRAUDE_THRESHOLD: "0.95"
      # Sprint 10.A — publica pix.liquidada pra análise pós-liquidação em streaming
      KAFKA_BROKER: kafka:29092
    restart: on-failure
    networks: [bankmore]

  contacorrente-api:
    build:
      context: ../..
      dockerfile: src/BankMore.ContaCorrente.Api/Dockerfile
    container_name: bankmore-contacorrente-api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-bankmore_db};Username=${POSTGRES_USER:-bankmore};Password=${POSTGRES_PASSWORD:-bankmore123};Maximum Pool Size=20
      JWT_KEY: ${JWT_KEY:?env JWT_KEY é obrigatória}
      Kafka__Broker: kafka:29092
    networks: [bankmore]

  # Sprint 7.A: Avro end-to-end ATIVO. Producer .NET serializa transferencia.solicitada
  # em Avro binário (Confluent wire format). Consumer PyFlink (fraud-detector) decoda
  # via fastavro + schema-registry. Para reverter ao JSON puro, basta Outbox__AvroTopics="".
  transferencia-api:
    build:
      context: ../..
      dockerfile: src/BankMore.Transferencia.Api/Dockerfile
    container_name: bankmore-transferencia-api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      # Sprint 7.A — producer Avro registra/baixa schema no boot
      schema-registry:
        condition: service_started
    ports:
      - "5001:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-bankmore_db};Username=${POSTGRES_USER:-bankmore};Password=${POSTGRES_PASSWORD:-bankmore123};Maximum Pool Size=10
      Kafka__Broker: kafka:29092
      JWT_KEY: ${JWT_KEY:?env JWT_KEY é obrigatória}
      # Sprint 5.B Outbox
      Outbox__PollIntervalMs: "500"
      Outbox__BatchSize: "50"
      # Sprint 6.A — DLQ após 5 tentativas
      Outbox__MaxTentativas: "5"
      # Sprint 7.A — Avro binário ATIVO em transferencia.solicitada. Consumer PyFlink
      # decoda via fastavro (latin-1 trick em SimpleStringSchema). Pra reverter ao JSON
      # puro durante incidente: Outbox__AvroTopics="" e rebuild.
      Outbox__AvroTopics: "transferencia.solicitada"
      SchemaRegistry__Url: http://schema-registry:8081
      # Sprint 7.B — token admin pros endpoints /api/admin/outbox/*. Vazio = endpoint
      # 503 (fail-closed). Default só pra demo; em prod, override no .env.
      Outbox__AdminToken: ${OUTBOX_ADMIN_TOKEN:-dev-admin-not-for-prod}
      # Sprint 7.C — retenção automática DLQ. 30d é safe pra investigação ops; ajustar
      # se DLQ crescer (já tem métrica bankmore_outbox_dlq_expiradas_total).
      Outbox__DlqRetentionDays: "30"
      Outbox__DlqRetentionIntervalHours: "24"
    networks: [bankmore]

  tarifas-worker:
    build:
      context: ../..
      dockerfile: src/BankMore.Tarifas.Worker/Dockerfile
    container_name: bankmore-tarifas-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-bankmore_db};Username=${POSTGRES_USER:-bankmore};Password=${POSTGRES_PASSWORD:-bankmore123};Maximum Pool Size=10
      Kafka__Broker: kafka:29092
      Redis__Connection: redis:6379
      METRICS_PORT: "9102"
    networks: [bankmore]

  # Sprint 3: ML scoring service (Flask + XGBoost embutido na imagem).
  # Modelo treinado no build da imagem (determinístico, seed=42).
  fraud-ml:
    build:
      context: ../../ml
      dockerfile: Dockerfile
    container_name: bankmore-fraud-ml
    ports:
      - "5003:5003"
    environment:
      ML_THRESHOLD: "0"      # 0 = usa threshold calibrado em train.py (recall >= 0.85)
    networks: [bankmore]

  # Sprint 2.5: PyFlink real (event-time + watermark + RocksDB MapState com TTL + side outputs).
  # Mesma lógica que o detector Python validado anteriormente. Trocar de detector é só
  # mudar o build > dockerfile entre 'Dockerfile' (Python puro) e 'Dockerfile.flink' (PyFlink).
  fraud-detector:
    build:
      context: ../../pyflink
      dockerfile: Dockerfile.flink
    container_name: bankmore-fraud-detector
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      fraud-ml:
        condition: service_healthy
      # Sprint 7.A — consumer Avro precisa buscar schema por id
      schema-registry:
        condition: service_started
    environment:
      KAFKA_BROKERS: kafka:29092
      SOURCE_TOPIC: transferencia.solicitada
      SINK_APROVADA: transferencia.aprovada
      SINK_REJEITADA: transferencia.rejeitada
      SINK_ALERTA: fraude.alerta
      GROUP_ID: fraud-detector-flink
      VALOR_ALTO_BRL: "10000.00"
      BURST_LIMITE_POR_MINUTO: "4"
      JANELA_BURST_SEGUNDOS: "60"
      WATERMARK_DELAY_SECONDS: "5"
      CHECKPOINT_INTERVAL_MS: "60000"
      # Sprint 7.A — Avro Schema Registry (cache em memória por schema_id)
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SCHEMA_REGISTRY_TIMEOUT: "3"
      # Sprint 3: chama o ML service. Threshold calibrado em 0.95 (entre
      # 0.7 agressivo e 0.991 do recall_85 do treino) — captura fraudes
      # claras (R$ ≥ 30k → score 0.99) sem bloquear valor alto legítimo
      # (R$ 10k → score 0.83 → APROVADA + ALERTA).
      ML_SERVICE_URL: http://fraud-ml:5003
      ML_TIMEOUT_SECONDS: "2"
      ML_REJEITAR_THRESHOLD: "0.95"
      # Sprint 5.A — Flink PrometheusReporter nativo (substitui prometheus_client
      # do Sprint 4.E que não convivia com cloudpickle dos operators).
      # Métricas auto: numRecordsIn/Out, checkpoint duration, kafka lag, latency.
    ports:
      - "9249:9249"   # Sprint 5.A — Prometheus scrape endpoint do Flink mini-cluster
    restart: on-failure
    networks: [bankmore]

  # ============================================================
  # Observability — Prometheus + Grafana (Sprint 5)
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: bankmore-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=24h'
      - '--web.enable-lifecycle'
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [bankmore]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: bankmore-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks: [bankmore]

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  flink_checkpoints:
  flink_savepoints:
  prometheus_data:
  grafana_data:

networks:
  bankmore:
    driver: bridge
